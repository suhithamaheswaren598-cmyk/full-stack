<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 200vh;

        }
        .navbar{
            position:sticky;
            top:0;
        }
        .relative{
            border: 2px solid red;
            position: relative;
            height: 50vh;
            margin-top: 20vh;
        }
        .absolute{
            border: 2px solid green;
            position:absolute;
            margin:10px;
            margin-left: 50px;
        }
        .fixed{
            position: fixed;
        }
        
    </style>

</head>
<body>
    <div class="navbar">
        <nav>
            <ul>
                <li>home</li>
                <li>about</li>
                <li>contact</li>
                <li>services</li>
            </ul>
        </nav>
    </div>
    <div class="relative">
        <h1>Relative</h1>
        <div class="absolute">
            <h1>absolute</h1>
        </div>
    </div>
    <div class="fixed">fixed</div>
    
    </div>
    
</body>
</html>
